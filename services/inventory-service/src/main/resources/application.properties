spring.application.name=inventory-service

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://inventory-service-db:5432/inventory}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:inventory_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:inventory_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=inventory_service
springdoc.swagger-ui.path=/docs
