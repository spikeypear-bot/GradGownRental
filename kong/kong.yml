_format_version: "3.0"
_transform: true

# =============================================================================
# Kong Declarative Configuration
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Error Service  (port 5002)
  # ---------------------------------------------------------------------------
  - name: error-service
    url: http://error-service:5002
    routes:
      - name: error-service-health
        methods: [GET]
        paths: [/error-service/health]
        strip_path: true   # strips /error-service prefix -> /health upstream

      - name: error-list
        methods: [GET, OPTIONS]
        paths: [/errors]
        strip_path: false

  # ---------------------------------------------------------------------------
  # Logistics Service  (internal port 5004, host-mapped 5006)
  # ---------------------------------------------------------------------------
  - name: logistics-service
    url: http://logistics-service:5004
    routes:
      - name: logistics-service-health
        methods: [GET]
        paths: [/logistics-service/health]
        strip_path: true

      - name: logistics-get-shipment
        methods: [GET, OPTIONS]
        paths: ["~/logistics/(?<shipment_id>[^/]+)$"]
        strip_path: false

  # ---------------------------------------------------------------------------
  # Notification Service  (port 5001)
  # ---------------------------------------------------------------------------
  - name: notification-service
    url: http://notification-service:5001
    routes:
      - name: notification-service-health
        methods: [GET]
        paths: [/notification-service/health]
        strip_path: true

      - name: notification-get-by-order
        methods: [GET, OPTIONS]
        paths: ["~/notifications/(?<order_id>[^/]+)$"]
        strip_path: false

  # ---------------------------------------------------------------------------
  # Order Service  (port 8081)
  # ---------------------------------------------------------------------------
  - name: order-service
    url: http://order-service:8081
    routes:
      - name: order-service-health
        methods: [GET]
        paths: [/order-service/health]
        strip_path: true

      - name: order-list-by-status
        methods: [GET, OPTIONS]
        paths: ["~/orders/status/(?<status>[^/]+)$"]
        strip_path: false

      - name: order-list-by-email
        methods: [GET, OPTIONS]
        paths: ["~/orders/by-email/(?<email>[^/]+)$"]
        strip_path: false

      - name: order-get-by-id
        methods: [GET, OPTIONS]
        paths: ["~/orders/(?<order_id>[^/]+)$"]
        strip_path: false


  # ---------------------------------------------------------------------------
  # Payment Service  (port 3000)
  # ---------------------------------------------------------------------------
  - name: payment-service
    url: http://payment-service:3000
    routes:
      - name: payment-service-health
        methods: [GET]
        paths: [/api/payment/health]
        strip_path: false

      - name: payment-checkout
        methods: [POST, OPTIONS]
        paths: [/api/payment/checkout]
        strip_path: false


  # ---------------------------------------------------------------------------
  # Inventory Service  (port 8080)
  # ---------------------------------------------------------------------------
  - name: inventory-service
    url: http://inventory-service:8080
    routes:
      - name: inventory-service-health
        methods: [GET]
        paths: [/inventory-service/health]
        strip_path: true

      - name: inventory-service_availability90_get
        methods: [GET, OPTIONS]
        paths: ["~/api/inventory/availability90$"]
        strip_path: false

      - name: inventory-service_availability_get
        methods: [GET, OPTIONS]
        paths: ["~/api/inventory/availability$"]
        strip_path: false

      - name: inventory-service_catalogue_get
        methods: [GET, OPTIONS]
        paths: ["~/api/inventory/catalogue$"]
        strip_path: false

      - name: inventory-service_soft-hold_post
        methods: [POST, OPTIONS]
        paths: ["~/api/inventory/soft-hold$"]
        strip_path: false

      - name: inventory-service_packages-all_get
        methods: [GET, OPTIONS]
        paths: ["~/api/inventory/packages/all$"]
        strip_path: false

      - name: inventory-service_packages_get
        methods: [GET, OPTIONS]
        paths: ["~/api/inventory/packages$"]
        strip_path: false

      - name: inventory-service_stock-overview_get
        methods: [GET, OPTIONS]
        paths: ["~/api/inventory/stock-overview$"]
        strip_path: false

      - name: inventory-service_packageid_get
        methods: [GET, OPTIONS]
        paths: ["~/api/inventory/(?<packageid>[^#?/]+)$"]
        strip_path: false

  # ---------------------------------------------------------------------------
  # Place Order Saga  (port 5003)
  # ---------------------------------------------------------------------------
  - name: place-order-saga
    url: http://place-order-saga:5003
    routes:
      - name: place-order-saga-health
        methods: [GET]
        paths: [/place-order-saga/health]
        strip_path: true

      - name: place-order-saga-create
        methods: [POST, OPTIONS]
        paths: [/orders/create]
        strip_path: false

      - name: place-order-saga-submit-payment
        methods: [POST, OPTIONS]
        paths: [/submit-payment]
        strip_path: false

  # ---------------------------------------------------------------------------
  # Fulfill Order Saga  (port 5004)
  # ---------------------------------------------------------------------------
  - name: fulfill-order-saga
    url: http://fulfill-order-saga:5004
    routes:
      - name: fulfill-order-saga-health
        methods: [GET]
        paths: [/fulfill-order-saga/health]
        strip_path: true

      - name: fulfill-order-saga-activate
        methods: [POST, OPTIONS]
        paths: [/fulfillment/activate]
        strip_path: false

  # ---------------------------------------------------------------------------
  # Return Order Saga  (port 5005)
  # ---------------------------------------------------------------------------
  - name: return-order-saga
    url: http://return-order-saga:5005
    routes:
      - name: return-order-saga-health
        methods: [GET]
        paths: [/return-order-saga/health]
        strip_path: true

      - name: return-order-saga-process
        methods: [POST, OPTIONS]
        paths: [/returns/process]
        strip_path: false

      - name: return-order-saga-transition-to-wash
        methods: [PUT, OPTIONS]
        paths: [/returns/transition-to-wash]
        strip_path: false

      - name: return-order-saga-maintenance-complete
        methods: [PUT, OPTIONS]
        paths: [/returns/maintenance-complete]
        strip_path: false
