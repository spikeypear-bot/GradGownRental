_format_version: "3.0"
_transform: true

# =============================================================================
# Kong Declarative Configuration
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Error Service  (port 5002)
  # ---------------------------------------------------------------------------
  - name: error-service
    url: http://error-service:5002
    routes:
      - name: error-service-health
        methods: [GET]
        paths: [/error-service/health]
        strip_path: true   # strips /error-service prefix -> /health upstream

      - name: error-list
        methods: [GET]
        paths: [/errors]
        strip_path: false

      - name: error-create
        methods: [POST]
        paths: [/errors]
        strip_path: false

  # ---------------------------------------------------------------------------
  # Logistics Service  (internal port 5004, host-mapped 5006)
  # ---------------------------------------------------------------------------
  - name: logistics-service
    url: http://logistics-service:5004
    routes:
      - name: logistics-service-health
        methods: [GET]
        paths: [/logistics-service/health]
        strip_path: true

      - name: logistics-order-paid
        methods: [POST]
        paths: [/logistics/events/order-paid]
        strip_path: false

      - name: logistics-update-shipment-status
        methods: [PUT]
        paths: ["~/logistics/(?<shipment_id>[^/]+)/status$"]
        strip_path: false

      - name: logistics-get-shipment
        methods: [GET]
        paths: ["~/logistics/(?<shipment_id>[^/]+)$"]
        strip_path: false

  # ---------------------------------------------------------------------------
  # Notification Service  (port 5001)
  # ---------------------------------------------------------------------------
  - name: notification-service
    url: http://notification-service:5001
    routes:
      - name: notification-service-health
        methods: [GET]
        paths: [/notification-service/health]
        strip_path: true

      - name: notification-get-by-order
        methods: [GET]
        paths: ["~/notifications/(?<order_id>[^/]+)$"]
        strip_path: false

  # ---------------------------------------------------------------------------
  # Order Service  (port 8081)
  # ---------------------------------------------------------------------------
  - name: order-service
    url: http://order-service:8081
    routes:
      - name: order-service-health
        methods: [GET]
        paths: [/order-service/health]
        strip_path: true

      - name: order-create
        methods: [POST]
        paths: [/orders]
        strip_path: false

      - name: order-list-by-status
        methods: [GET]
        paths: ["~/orders/status/(?<status>[^/]+)$"]
        strip_path: false

      - name: order-list-by-email
        methods: [GET]
        paths: ["~/orders/by-email/(?<email>[^/]+)$"]
        strip_path: false

      - name: order-get-by-id
        methods: [GET]
        paths: ["~/orders/(?<order_id>[^/]+)$"]
        strip_path: false

      - name: order-update-status
        methods: [PUT]
        paths: ["~/orders/(?<order_id>[^/]+)/status$"]
        strip_path: false

      - name: order-activate
        methods: [POST]
        paths: ["~/orders/(?<order_id>[^/]+)/activate$"]
        strip_path: false

      - name: order-return
        methods: [POST]
        paths: ["~/orders/(?<order_id>[^/]+)/return$"]
        strip_path: false

  # ---------------------------------------------------------------------------
  # Payment Service  (port 3000)
  # ---------------------------------------------------------------------------
  - name: payment-service
    url: http://payment-service:3000
    routes:
      - name: payment-service-health
        methods: [GET]
        paths: [/payment-service/health]
        strip_path: true

      - name: payment-checkout
        methods: [POST]
        paths: [/checkout]
        strip_path: false

      - name: payment-authorise
        methods: [POST]
        paths: [/payments]
        strip_path: false

      - name: payment-refund
        methods: [POST]
        paths: [/payments/refunds]
        strip_path: false

      - name: payment-webhook
        methods: [POST]
        paths: [/webhook]
        strip_path: false

      - name: payment-test
        methods: [GET]
        paths: [/test]
        strip_path: false
