# VOLUMES — one named volume per database so data persists across restarts
# =============================================================================
volumes:
  inventory-data:
  payment-data:
  notification-data:
  # order-data:       # uncomment when order-service merges
  # auth-data:        # uncomment when auth-service is wired up
  # error-data:       # uncomment when error-service is wired up

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  app-network:
    driver: bridge