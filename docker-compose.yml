  # =========================================================================
  # COMPOSITE SERVICES (SAGAS)
  # =========================================================================

  # ── Place an Order Saga (Flask / Python) ──────────────────────────────────
  place-order-saga:
    build:
      context: ./sagas/place-order-saga
    container_name: place-order-saga
    depends_on:
      kafka:
        condition: service_healthy
      inventory-service:
        condition: service_started
      # Uncomment once branches merge:
      # order-service:
      #   condition: service_started
      # payment-service:
      #   condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INVENTORY_SERVICE_URL: http://inventory-service:8080
      ORDER_SERVICE_URL: http://order-service:8081       # stubbed until order-service merges
      PAYMENT_SERVICE_URL: http://payment-service:3000   # stubbed until payment-service merges
      ERROR_SERVICE_URL: http://error-service:5002
    ports:
      - "5003:5003"
    networks:
      - app-network
    restart: on-failure

